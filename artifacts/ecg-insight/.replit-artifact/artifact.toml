kind = "mobile"
previewPath = "/"
title = "ECG Insight"
version = "1.0.0"
id = "artifacts/ecg-insight"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18731

[services.development]
run = "pnpm --filter @workspace/ecg-insight run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecg-insight", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ecg-insight", "run", "serve" ]

[services.env]
PORT = "18731"
BASE_PATH = "/"
