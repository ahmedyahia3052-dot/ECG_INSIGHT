<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0D9488" />
    <title>ECG Insight Offline</title>
    <style>
      body {
        align-items: center;
        background: #050816;
        color: #f8fafc;
        display: flex;
        font-family: Inter, Arial, sans-serif;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }
      main {
        border: 1px solid rgba(103, 232, 249, 0.3);
        border-radius: 28px;
        max-width: 520px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.84);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }
      h1 { margin-top: 0; }
      p { color: #b6c7d8; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main>
      <h1>ECG Insight is offline</h1>
      <p>Your cached dashboard and queued ECG uploads remain available. Reconnect to sync pending actions, uploads, and patient changes.</p>
      <p id="offline-reason">Browser online: false · Backend reachable: unknown · Offline reason: waiting for reconnection.</p>
    </main>
    <script>
      const reason = document.getElementById("offline-reason");
      async function recoverWhenReachable() {
        const browserOnline = navigator.onLine !== false;
        let backendReachable = false;
        try {
          const response = await fetch("/health", { cache: "no-store", headers: { accept: "application/json" } });
          backendReachable = response.status < 500;
        } catch {
          backendReachable = false;
        }
        const offlineReason = browserOnline || backendReachable ? "online" : "browser-offline-and-backend-unreachable";
        console.info(`[ECG Insight PWA] Browser online: ${browserOnline}`);
        console.info(`[ECG Insight PWA] Backend reachable: ${backendReachable}`);
        console.info(`[ECG Insight PWA] Offline reason: ${offlineReason}`);
        if (reason) {
          reason.textContent = `Browser online: ${browserOnline} · Backend reachable: ${backendReachable} · Offline reason: ${offlineReason}`;
        }
        if (browserOnline || backendReachable) window.location.reload();
      }
      window.addEventListener("online", recoverWhenReachable);
      setInterval(recoverWhenReachable, 5000);
      void recoverWhenReachable();
    </script>
  </body>
</html>
