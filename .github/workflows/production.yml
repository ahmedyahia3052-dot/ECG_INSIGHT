name: Production Infrastructure CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - backup-before-restore

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ecg_insight_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d ecg_insight_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      BACKUP_DIR: backups
      BACKUP_RETENTION_DAYS: 30
      CLIENT_ORIGIN: https://app.example.com
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecg_insight_ci
      EXPO_PUBLIC_API_URL: https://api.example.com/api
      JWT_REFRESH_SECRET: ci-refresh-secret-000000000000000000000000000000
      JWT_SECRET: ci-access-secret-00000000000000000000000000000000
      NODE_ENV: production
      PORT: 3001
      RATE_LIMIT_MAX: 600
      RATE_LIMIT_WINDOW_MS: 900000
      STORAGE_PATH: uploads
      TRUST_PROXY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run db:seed

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        env:
          NODE_ENV: test
        run: npm run test

      - name: Production validation
        run: npm run validate:production

      - name: Secret placeholder check
        run: |
          test ! -f .env || (echo ".env must not be committed" && exit 1)
          grep -R "replace-with" .env.production .env.staging .env.production.example >/dev/null

      - name: Build production backend image
        run: docker build -f Dockerfile.backend.production -t ecg-insight-api:ci .

      - name: Build production frontend image
        run: docker build -f Dockerfile.frontend.production -t ecg-insight-frontend:ci .

      - name: Build AI engine image
        run: docker build -f ai-engine/Dockerfile.production -t ecg-insight-ai-engine:ci .

      - name: Validate production compose config
        run: docker compose -f docker-compose.production.yml config

      - name: Start API for smoke tests
        run: |
          npx prisma migrate deploy
          npx tsx server/src/index.ts &
          echo $! > api.pid
          sleep 10

      - name: Smoke test health endpoints
        env:
          PRODUCTION_BASE_URL: http://127.0.0.1:3001
        run: npm run smoke:production

      - name: Stop API
        if: always()
        run: |
          if [ -f api.pid ]; then kill "$(cat api.pid)" || true; fi

  deploy:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deployment gate
        run: echo "Production deployment is ready. Configure registry/server secrets to execute rollout."
